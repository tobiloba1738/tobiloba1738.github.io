<!DOCTYPE html>
<html>
<head>
<title>My Store</title>
</head>

<body>

<h1>Welcome to My Store</h1>

<script>

<script>

alert("Welcome to my store!");

var name = prompt("What is your name?");
var item = prompt("What item do you want?");
var quantity = prompt("How many items do you want? (1-99)");

var hour = new Date().getHours();
var greeting;

if (hour < 12) {
    greeting = "Good Morning";
} else if (hour < 18) {
    greeting = "Good Afternoon";
} else {
    greeting = "Good Evening";
}

var arrival = new Date();
arrival.setDate(arrival.getDate() + 7);

document.write("<h2>" + greeting + " " + name + "!</h2>");
document.write("Item Ordered: " + item + "<br>");
document.write("Quantity: " + quantity + "<br>");
document.write("Your order will arrive on: " + arrival);
</script>

</body>
</html>

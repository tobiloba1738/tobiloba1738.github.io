<!DOCTYPE html>
<html>
<head>
  <title>Registration</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <div class="container mt-5">
    <h2>Registration Form</h2>

    <form id="form">

      <input class="form-control mb-2" id="first" placeholder="First Name">
      <input class="form-control mb-2" id="last" placeholder="Last Name">
      <input class="form-control mb-2" id="email" placeholder="Email">
      <input class="form-control mb-2" id="password" type="password" placeholder="Password (! or ?)">
      <input class="form-control mb-2" id="dob" type="date">

      <button class="btn btn-primary mt-2">Register</button>

    </form>

    <div id="output" class="mt-3"></div>

  </div>

  <script>
    document.getElementById("form").addEventListener("submit", function(e) {

      e.preventDefault();

      let f = document.getElementById("first").value;
      let l = document.getElementById("last").value;
      let em = document.getElementById("email").value;
      let p = document.getElementById("password").value;
      let d = document.getElementById("dob").value;

      // check empty
      if (f === "" || l === "" || em === "" || p === "" || d === "") {
        document.getElementById("output").innerHTML =
          '<div class="alert alert-danger">Fill all fields</div>';
        return;
      }

      // check password
      if (p.indexOf("!") === -1 && p.indexOf("?") === -1) {
        document.getElementById("output").innerHTML =
          '<div class="alert alert-danger">Password needs ! or ?</div>';
        return;
      }

      // hide password
      let stars = "";
      for (let i = 0; i < p.length; i++) {
        stars += "*";
      }

      // user object
      let user = {
        first: f,
        last: l,
        email: em,
        password: stars,
        dob: d
      };

      // show result
      document.getElementById("output").innerHTML =
        '<div class="alert alert-success">' +
        "Success<br>" +
        user.first + " " + user.last + "<br>" +
        user.email + "<br>" +
        user.password + "<br>" +
        user.dob +
        '</div>';
    });
  </script>

</body>
</html>

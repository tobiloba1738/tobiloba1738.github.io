<!DOCTYPE html>
<html>
<head>
  <title>Cat Facts</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-3">

  <h3>Cat Facts</h3>

  <button class="btn btn-primary" onclick="loadData()">Get Data</button>

  <br><br>

  <img id="pic" src="https://via.placeholder.com/200" width="200">

  <br><br>

  <table class="table table-bordered">
    <tr>
      <th>factId</th>
      <th>fact</th>
    </tr>
    <tbody id="body"></tbody>
  </table>

</div>

<script>
function loadData() {

  fetch("https://catfact.ninja/facts")
    .then(function(res) {
      return res.json();
    })
    .then(function(data) {

      var table = document.getElementById("body");
      table.innerHTML = "";

      for (var i = 0; i < data.data.length; i++) {
        table.innerHTML +=
          "<tr><td>" +
          (i + 1) +
          "</td><td>" +
          data.data[i].fact +
          "</td></tr>";
      }

      fetch("https://catfact.ninja/fact")
        .then(function(res) {
          return res.json();
        })
        .then(function(oneFact) {

          document.getElementById("pic").src =
            "https://cataas.com/cat?" + Math.random();

        });

    });

}
</script>

</body>
</html>

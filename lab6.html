<!DOCTYPE html>
<html>
<head>
  <title>Characters</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-3">

  <h3>Characters</h3>

  <button class="btn btn-primary" onclick="loadData()">Get Data</button>

  <br><br>

  <img id="pic" src="https://via.placeholder.com/200" width="200">

  <br><br>

  <table class="table table-bordered">
    <tr>
      <th>id</th>
      <th>name</th>
    </tr>
    <tbody id="body"></tbody>
  </table>

</div>

<script>
function loadData() {

  var table = document.getElementById("body");
  table.innerHTML = "";

  var list = [];
  var total = 10;
  var done = 0;

  for (var i = 0; i < total; i++) {

    var randomId = Math.floor(Math.random() * 50) + 1;

    fetch("https://rickandmortyapi.com/api/character/" + randomId)
      .then(function(res) {
        return res.json();
      })
      .then(function(data) {

        list.push(data);
        done++;

        if (done == total) {

          list.sort(function(a, b) {
            return a.id - b.id;
          });

          for (var j = 0; j < list.length; j++) {
            table.innerHTML +=
              "<tr><td>" +
              list[j].id +
              "</td><td>" +
              list[j].name +
              "</td></tr>";
          }

        }

      });

  }

  var randomId = Math.floor(Math.random() * 50) + 1;

  fetch("https://rickandmortyapi.com/api/character/" + randomId)
    .then(function(res) {
      return res.json();
    })
    .then(function(data) {
      document.getElementById("pic").src = data.image;
    });

}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Pokemon Data</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-3">
  <h3>Pokemon Data</h3>

  <button class="btn btn-primary" onclick="loadData()">Get Data</button>

  <br><br>

  <img id="pic" src="https://via.placeholder.com/200" width="200">

  <br><br>

  <table class="table table-bordered">
    <tr>
      <th>id</th>
      <th>name</th>
    </tr>
    <tbody id="body"></tbody>
  </table>
</div>

<script>
function loadData() {
  var table = document.getElementById("body");
  table.innerHTML = "";

  var pokemonList = [];
  var total = 10;
  var done = 0;

  for (var i = 0; i < total; i++) {
    var randomId = Math.floor(Math.random() * 151) + 1;

    fetch("https://pokeapi.co/api/v2/pokemon/" + randomId)
      .then(function(response) {
        return response.json();
      })
      .then(function(pokemon) {
        pokemonList.push(pokemon);
        done++;

        if (done == total) {
          pokemonList.sort(function(a, b) {
            return a.id - b.id;
          });

          for (var j = 0; j < pokemonList.length; j++) {
            table.innerHTML +=
              "<tr><td>" +
              pokemonList[j].id +
              "</td><td>" +
              pokemonList[j].name +
              "</td></tr>";
          }
        }
      });
  }

  var imageId = Math.floor(Math.random() * 151) + 1;

  fetch("https://pokeapi.co/api/v2/pokemon/" + imageId)
    .then(function(response) {
      return response.json();
    })
    .then(function(pokemon) {
      document.getElementById("pic").src = pokemon.sprites.front_default;
    });
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Game List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-3">

  <h3>Free Games</h3>

  <button class="btn btn-primary" onclick="loadData()">Get Data</button>

  <br><br>

  <img id="pic" src="https://via.placeholder.com/200" width="200">

  <br><br>

  <table class="table table-bordered">
    <tr>
      <th>id</th>
      <th>game</th>
    </tr>
    <tbody id="body"></tbody>
  </table>

</div>

<script>
function loadData() {
  fetch("https://www.freetogame.com/api/games")
    .then(function(response) {
      return response.json();
    })
    .then(function(data) {
      var table = document.getElementById("body");
      table.innerHTML = "";

      for (var i = 0; i < 10; i++) {
        table.innerHTML +=
          "<tr><td>" +
          data[i].id +
          "</td><td>" +
          data[i].title +
          "</td></tr>";
      }

      return fetch("https://www.freetogame.com/api/game?id=" + data[0].id);
    })
    .then(function(response) {
      return response.json();
    })
    .then(function(game) {
      document.getElementById("pic").src = game.thumbnail;
    });
}
</script>

</body>
</html>

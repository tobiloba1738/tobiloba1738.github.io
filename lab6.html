<!DOCTYPE html>
<html>
<head>
  <title>REST API Assignment</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-3">
  <h3>Character Facts</h3>

  <button class="btn btn-primary" onclick="loadData()">Get Data</button>

  <br><br>

  <img id="pic" src="https://via.placeholder.com/200" width="200">

  <br><br>

  <table class="table table-bordered">
    <tr>
      <th>factId</th>
      <th>fact</th>
    </tr>
    <tbody id="body"></tbody>
  </table>
</div>

<script>
function loadData() {
  var table = document.getElementById("body");
  table.innerHTML = "";

  fetch("https://rickandmortyapi.com/api/character")
    .then(function(response) {
      return response.json();
    })
    .then(function(data) {
      var characters = data.results;

      characters.sort(function(a, b) {
        return a.id - b.id;
      });

      for (var i = 0; i < characters.length; i++) {
        table.innerHTML +=
          "<tr><td>" +
          characters[i].id +
          "</td><td>" +
          characters[i].name +
          "</td></tr>";
      }

      var randomId = Math.floor(Math.random() * characters.length) + 1;

      return fetch("https://rickandmortyapi.com/api/character/" + randomId);
    })
    .then(function(response) {
      return response.json();
    })
    .then(function(character) {
      document.getElementById("pic").src = character.image;
    })
    .catch(function(error) {
      console.log(error);
    });
}
</script>

</body>
</html>

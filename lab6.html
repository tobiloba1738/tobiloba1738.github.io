<!DOCTYPE html>
<html>
<head>
  <title>Cat Facts</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container">

  <h3>Cat Facts</h3>

  <button class="btn btn-primary" onclick="loadData()">Get Data</button>

  <br><br>

  <img id="pic" src="https://via.placeholder.com/200" width="200">

  <br><br>

  <table class="table table-bordered">
    <tr>
      <th>factId</th>
      <th>fact</th>
    </tr>
    <tbody id="body"></tbody>
  </table>

</div>

<script>
function loadData() {
  fetch("https://brianobruno.github.io/cats.json")
    .then(function(response) {
      return response.json();
    })
    .then(function(data) {

      data.facts.sort(function(a, b) {
        return a.factId - b.factId;
      });

      var table = document.getElementById("body");
      table.innerHTML = "";

      for (var i = 0; i < data.facts.length; i++) {
        table.innerHTML +=
          "<tr><td>" +
          data.facts[i].factId +
          "</td><td>" +
          data.facts[i].text +
          "</td></tr>";
      }

      document.getElementById("pic").src = data.catPhoto;

    });
}
</script>

</body>
</html>
